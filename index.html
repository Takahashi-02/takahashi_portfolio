<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>髙橋 勇喜 | Game Engineer Portfolio</title>

  <!-- css/main_style.css を読み込む（index.html と同じ階層の css フォルダ） -->
  <link rel="stylesheet" href="css/main_style.css" />

  <!-- Google Fonts の DotGothic16 を読み込む トップページのコマンドボタン用 -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />




</head>
<body>

  <!--
    #app … サイト全体の入れ物（将来、詳細画面などもここに増やす）
    #screen-top … TOP 画面の「箱」。中の要素を CSS で重ねる
  -->
  <div id="app">
    <div id="screen-top" class="screen is-active">

      <!-- レイヤー0: 空（div + CSS の background-image） -->
      <div class="scene-bg" aria-hidden="true">
        <div class="scene-bg__track">
          <img class="scene-bg__tile" src="assets/images/bg.png" alt="" />
          <img class="scene-bg__tile" src="assets/images/bg.png" alt="" />
        </div>
      </div>

      <!-- レイヤー1: 床（透過PNG → 道と土だけ見える） -->
      <img class="scene-floor" src="assets/images/floor.png" alt="" />

      <!-- レイヤー2: キャラ（透過PNG） -->
      <img class="scene-character" src="assets/images/character.png" alt="キャラクター" />

      <!-- レイヤー3: コマンドパネル（TOP のみ表示・Phase 3 で動かす） -->
      <aside class="command-panel" aria-label="RPG風コマンドメニュー">
        <div class="panel-title">どれをみる？</div>
        
        <!-- data-screen はshowScreen() で使う名前 -->
        <button type="button" class="command-item" data-screen="about">
          <span>About</span><small>自己紹介</small>
        </button>
        
        <button type="button" class="command-item" data-screen="skills">
          <span>Skills</span><small>技術スタック</small>
        </button>
        
        <button type="button" class="command-item" data-screen="works">
          <span>Works</span><small>制作実績</small> 
        </button>

        <button type="button" class="command-item" data-screen="timeline">
          <span>TimeLine</span><small>経歴</small>
        </button>
        
        <button type="button" class="command-item" data-screen="contact">
          <span>Contact</span><small>連絡先</small>
        </button>
        
      </aside>
      
      <!-- レイヤー4: ジャンプバー 詳細時(Aboutなどの表示時)のみ表示するバー -->
      <nav class="jump-bar is-hidden" aria-label="ページジャンプ">
        <button type="button" class="jump-item" data-screen="top">TOP</button>
        <button type="button" class="jump-item" data-screen="about">About</button>
        <button type="button" class="jump-item" data-screen="skills">Skills</button>
        <button type="button" class="jump-item" data-screen="works">Works</button>
        <button type="button" class="jump-item" data-screen="timeline">Timeline</button>
        <button type="button" class="jump-item" data-screen="contact">Contact</button>
      </nav>

      <!-- レイヤー5: 大詳細パネル（オレンジ枠イメージ・初期は非表示） -->
      <section class="detail-panel is-hidden" aria-live="polite">
        <button type="button" class="btn-back">戻る</button>

        <div class="detail-panel__body">
          <article class="detail-content" data-content="about">
            <h2>About</h2>
            <p>自己紹介（仮）。</p>
          </article>

          <article class="detail-content is-hidden" data-content="skills">
            <h2>Skills</h2>
            <p>スキル（仮）。</p>
          </article>

          <article class="detail-content is-hidden" data-content="works">
            <h2>Works</h2>
            <p>制作実績（仮）。</p>
          </article>

          <article class="detail-content is-hidden" data-content="timeline">
            <h2>Timeline</h2>
            <p>経歴（仮）。</p>
          </article>

          <article class="detail-content is-hidden" data-content="contact">
            <h2>Contact</h2>
            <p>連絡先（仮）。</p>
          </article>
        </div>
      </section>










    </div>
  </div>

  <!-- Phase 3 で画面切り替えを入れるときに有効化 -->
  <script src="js/main_script.js"></script>

</body>
</html>
